<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b5cff" />
  <title>My PWA Project</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1 class="brand">My PWA Project</h1>

    <form id="query-form" class="card" novalidate>
      <label for="text-input" class="label">Escribe tu consulta</label>
      <textarea id="text-input" name="text" placeholder="Escribe aquí..." rows="4" aria-label="Consulta"></textarea>

      <label class="label">Adjuntar archivos</label>
      <input id="file-input" type="file" name="files" multiple aria-label="Adjuntar archivos" />

      <div class="actions">
        <button id="attach-btn" type="button" class="btn secondary">Seleccionar archivos</button>
        <button id="send-btn" type="submit" class="btn primary">Enviar</button>
      </div>
    </form>

    <section id="result" class="result card" aria-live="polite">
      <h2>Resultado</h2>
      <pre id="result-text">Aquí aparecerá la respuesta</pre>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => { /* registrado */ })
        .catch((err) => { console.warn('ServiceWorker registration failed:', err); });
    }
  </script>
</body>
</html>
